name: Main

on: [push, workflow_dispatch]

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Get the code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Load super-linter env variables
        run: |
          cat .github/super-linter.env >> "$GITHUB_ENV"

      - name: Lint code base
        uses: super-linter/super-linter@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tests:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Load env variables
        run: |
          cat .github/common.env >> "$GITHUB_ENV"

      - name: Install Hugo
        run: |
          brew install hugo

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get npm cache directory
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> "${GITHUB_OUTPUT}"

      - uses: actions/cache@v6
        id: npm-cache
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install npm dependencies
        run: |
          npm ci

      - name: Run jest tests
        run: |
          npm test

  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Load env variables
        run: |
          cat .github/common.env >> "$GITHUB_ENV"

      - name: Install Hugo
        run: |
          brew install hugo

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get npm cache directory
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> "${GITHUB_OUTPUT}"

      - uses: actions/cache@v6
        id: npm-cache
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install npm dependencies
        run: |
          npm ci

      - name: Build the Hugo site
        run: |
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: "public/"

  lighthouse:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      statuses: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Load env variables
        run: |
          cat .github/common.env >> "$GITHUB_ENV"

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Lighthouse
        run: |
          npm install -g @lhci/cli@0.14.x

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: 'public/'

      - name: Run Lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lhci autorun

      - name: Upload Lighthouse results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: '.lighthouseci/**'
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

      - name: Publish Lighthouse summary
        if: always()
        run: |
          node scripts/lighthouse-summary.js | tee -a "$GITHUB_STEP_SUMMARY"
