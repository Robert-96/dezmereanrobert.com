{{ define "main" }}
<article class="divide-y divide-slate-200 dark:divide-slate-200/5">
  <header class="pt-3 pb-9 space-y-3 md:space-y-5">
    <h1 class="site-page-title">{{ .Title | markdownify }}</h1>

    <p class="site-subtitle">{{ .Params.Subtitle | markdownify }}</p>
  </header>

  <div class="prose prose-green dark:prose-invert max-w-none pt-9">
    {{ .Content }}
  </div>
</article>
{{ end }}
