<!DOCTYPE html>
<html {{ with site.LanguageCode | default site.Language.Lang }} lang="{{ . }}"{{ end }}>
  {{- partial "head.html" . -}}
  <body class="site-bg-pattern bg-slate-200/40 dark:bg-slate-950 text-slate-500 dark:text-slate-400 antialiased">
    <div class="max-w-screen mx-0 p-0 mx-auto md:my-8 md:px-6 lg:max-w-5xl xl:max-w-6xl 2xl:max-w-7xl xl:px-0">
      <div class="site-frame">
        <div class="h-3 bg-linear-to-r from-lime-500 via-green-500 via-emerald-500 to-teal-500" aria-hidden="true"></div>
        <div class="site-chrome" aria-hidden="true">
          <span class="site-chrome-dot"></span>
          <span class="site-chrome-dot"></span>
          <span class="site-chrome-dot site-chrome-dot-active"></span>
        </div>

        <div class="px-4 sm:px-6 xl:px-8">
          {{- partial "header.html" . -}}

          <div class="divide-y divide-slate-200 dark:divide-slate-200/5 pb-24">
            {{- block "main" . }}{{- end }}
          </div>

          <div id="scroll-to-top-wrapper" class="hidden fixed bottom-8 right-8 md:flex">
            <button id="scroll-to-top-button" aria-label="Scroll To Top" class="rounded-full bg-gray-200 p-2 text-gray-500 transition-all cursor-pointer hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-400 dark:hover:bg-gray-600">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="size-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
              </svg>
            </button>
          </div>

          {{- partial "footer.html" . -}}
        </div>
      </div>
    </div>

    {{- partial "dev/dev-tools.html" . -}}

    {{- partial "script.html" . -}}
  </body>
</html>
