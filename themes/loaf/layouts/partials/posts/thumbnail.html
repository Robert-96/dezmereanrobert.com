<article>
  <h3 class="text-base font-bold leading-6 tracking-tight text-gray-900 dark:text-white">
    <a class="border-b-2 border-transparent hover:border-green-500" href="{{ .RelPermalink }}">{{ if .Draft }}DRAFT: {{end}}{{ .Title | markdownify }}</a>
  </h3>

  {{ if .Summary }}
    <div class="prose prose-green dark:prose-invert max-w-none text-sm font-normal site-body-muted">
      <p>{{ .Summary }}</p>
    </div>
  {{ end }}

  {{ partial "base/read-more" . }}
</article>
