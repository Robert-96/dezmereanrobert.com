<footer class="border-t border-slate-200 py-8 text-center text-sm font-medium text-slate-500 dark:border-slate-700 dark:text-slate-300">
  <div class="flex flex-wrap items-center justify-center gap-x-5 gap-y-2 uppercase no-underline">
    <a class="site-social-link" href="{{ "/index.xml" | relURL }}" type="application/rss+xml" target="_blank" rel="noopener noreferrer">RSS Feed</a>

    {{ range $key, $value := .Site.Params.Social }}
      <a class="site-social-link" href="{{ $value }}" rel="noopener noreferrer">{{ $key }}</a>
    {{ end }}
  </div>

  <div class="mt-6">
    <small>Copyright © {{ .Site.Params.author }} 2021-{{now.Format "2006"}}</small>
  </div>
</footer>
