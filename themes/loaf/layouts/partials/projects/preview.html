<article class="space-y-3">
  <div class="space-y-5">
    <div class="space-y-4">
      <div class="space-y-3">
        {{ partial "base/preview-title" . }}

        <div class="flex flex-wrap gap-2">
          {{ range .Params.Tech }}
            <span class="site-tech-chip">{{ . }}</span>
          {{ end }}
        </div>
      </div>

      <div class="prose prose-green dark:prose-invert max-w-none site-body-muted">
        {{ .Summary  }}
      </div>
    </div>

    <div class="space-y-3">
      {{ partial "base/project-links" . }}
    </div>

    {{ partial "base/read-more" . }}
  </div>
</article>
